<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registration Chatbot</title>
  <!-- Google Fonts — Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── MD3 Color Tokens (Light Scheme) ───────────────────── */
    :root {
      --md-primary: #00639b;
      --md-on-primary: #ffffff;
      --md-primary-container: #d1e4ff;
      --md-on-primary-cont: #001d35;

      --md-secondary: #535f70;
      --md-secondary-container: #d6e3f7;
      --md-on-secondary-cont: #101c2b;

      --md-surface: #f8f9ff;
      --md-surface-1: #ffffff;
      --md-surface-2: #f1f3f9;
      --md-surface-variant: #e1e2ec;
      --md-on-surface: #1a1c1e;
      --md-on-surface-variant: #44474f;
      --md-outline: #74777f;
      --md-outline-variant: #c4c6d0;

      --md-error: #ba1a1a;
      --md-error-container: #ffdad6;
      --md-on-error-cont: #410002;

      --md-success: #006e33;
      --md-success-container: #96f7ad;
      --md-on-success-cont: #00210b;

      /* Elevation (box-shadow) */
      --md-elev-1: 0 1px 3px 1px rgba(0, 0, 0, .15), 0 1px 2px 0 rgba(0, 0, 0, .3);
      --md-elev-2: 0 2px 6px 2px rgba(0, 0, 0, .15), 0 1px 2px 0 rgba(0, 0, 0, .3);
      --md-elev-3: 0 4px 8px 3px rgba(0, 0, 0, .15), 0 1px 3px 0 rgba(0, 0, 0, .3);

      --md-radius-sm: 8px;
      --md-radius-md: 12px;
      --md-radius-lg: 16px;
      --md-radius-xl: 24px;
      --md-radius-full: 999px;

      --transition: 0.25s cubic-bezier(0.2, 0, 0, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', sans-serif;
      color: var(--md-on-surface);
      background: var(--md-surface);
      background-image: radial-gradient(circle at 10% 20%, rgba(0, 99, 155, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(83, 95, 112, 0.05) 0%, transparent 40%);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .chat-shell {
      width: min(920px, 100%);
      height: min(780px, calc(100vh - 48px));
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--md-surface-1);
      border-radius: var(--md-radius-xl);
      box-shadow: var(--md-elev-3);
      overflow: hidden;
      transition: box-shadow var(--transition);
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--md-outline-variant);
      background: var(--md-surface-2);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .mark {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: var(--md-radius-lg);
      background: var(--md-primary);
      color: var(--md-on-primary);
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: var(--md-elev-1);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      color: var(--md-on-surface);
    }

    .subtitle {
      margin-top: 2px;
      color: var(--md-on-surface-variant);
      font-size: 13px;
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 200px;
      color: var(--md-on-surface-variant);
      font-size: 13px;
      font-weight: 500;
    }

    .progress-track {
      flex: 1;
      height: 4px;
      border-radius: var(--md-radius-full);
      background: var(--md-surface-variant);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: var(--md-primary);
      border-radius: var(--md-radius-full);
      transition: width var(--transition);
    }

    .messages {
      min-height: 0;
      padding: 24px;
      overflow-y: auto;
      background: var(--md-surface);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message-row {
      display: flex;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: min(680px, 85%);
      padding: 14px 18px;
      font-size: 15px;
      line-height: 1.5;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      box-shadow: var(--md-elev-1);
      transition: transform var(--transition), opacity var(--transition);
      opacity: 0;
      transform: translateY(10px);
      animation: bubbleIn var(--transition) forwards;
    }

    @keyframes bubbleIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .bot .bubble {
      background: var(--md-surface-1);
      border-radius: 4px 16px 16px 16px;
      color: var(--md-on-surface);
      border: 1px solid var(--md-outline-variant);
    }

    .user .bubble {
      background: var(--md-primary-container);
      border-radius: 16px 4px 16px 16px;
      color: var(--md-on-primary-cont);
      border: 1px solid transparent;
    }

    .system .bubble {
      background: var(--md-error-container);
      color: var(--md-on-error-cont);
      border-radius: var(--md-radius-lg);
      border: 1px solid transparent;
    }

    .system.ok .bubble {
      background: var(--md-success-container);
      color: var(--md-on-success-cont);
      border-radius: var(--md-radius-lg);
      border: 1px solid transparent;
    }

    .composer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-top: 1px solid var(--md-outline-variant);
      background: var(--md-surface-2);
    }

    .input-container {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--md-surface-1);
      border: 1px solid var(--md-outline);
      border-radius: var(--md-radius-xl);
      height: 54px;
      padding: 0 8px 0 18px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .input-container:focus-within {
      border-color: var(--md-primary);
      box-shadow: 0 0 0 3px rgba(0, 99, 155, 0.15);
    }

    .input-container input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      color: var(--md-on-surface);
      background: transparent;
      height: 100%;
      padding-right: 8px;
    }

    .input-container input::placeholder {
      color: var(--md-on-surface-variant);
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: var(--md-radius-full);
      background: var(--md-primary);
      color: var(--md-on-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
    }

    .send-btn:hover {
      background: #004d7a;
      transform: scale(1.05);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      opacity: .5;
      cursor: wait;
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* Admin Panel Link */
    .admin-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: transparent;
      border: 1px solid var(--md-outline);
      border-radius: var(--md-radius-full);
      color: var(--md-primary);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
    }

    .admin-link:hover {
      background: var(--md-primary-container);
      color: var(--md-on-primary-cont);
      border-color: var(--md-primary);
    }

    /* LinkedIn button */
    .linkedin-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      margin: 8px 0;
      background: #0077b5;
      color: #fff;
      border: 0;
      border-radius: var(--md-radius-full);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      width: fit-content;
      box-shadow: var(--md-elev-1);
      transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
    }

    .linkedin-btn:hover {
      background: #005f91;
      box-shadow: var(--md-elev-2);
      transform: translateY(-1px);
    }

    .linkedin-btn:active {
      transform: translateY(0);
    }

    .linkedin-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
      flex-shrink: 0;
    }

    .linkedin-card {
      background: var(--md-surface-1) !important;
      border: 1.5px dashed var(--md-primary) !important;
      border-radius: var(--md-radius-lg) !important;
      padding: 20px 24px !important;
      width: 100% !important;
      max-width: 320px !important;
      margin-top: 8px;
      box-shadow: var(--md-elev-2) !important;
      text-align: center;
    }

    @media (max-width:640px) {
      main {
        padding: 0;
      }

      .chat-shell {
        height: 100vh;
        border-radius: 0;
      }

      .chat-header {
        flex-direction: column;
        align-items: flex-start;
        padding: 16px;
      }

      .progress {
        width: 100%;
      }

      .messages {
        padding: 16px;
      }

      .bubble {
        max-width: 90%;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="chat-shell" aria-label="Registration chatbot">
      <header class="chat-header">
        <div class="brand">
          <div class="mark">CB</div>
          <div>
            <h1>Registration Chatbot</h1>
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
          <a href="{% url 'user_details' %}" class="admin-link">
            Admin Panel
          </a>
          <div class="progress" aria-live="polite">
            <span id="progressLabel">Start</span>
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </div>
        </div>
      </header>

      <div class="messages" id="messages" aria-live="polite"></div>

      <div style="display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; background: var(--md-surface-2); border-top: 1px solid var(--md-outline-variant); font-size: 14px;">
        <a href="{% url 'chatbot_login' %}" style="color: var(--md-primary); text-decoration: none; font-weight: 600; transition: color var(--transition);" onmouseover="this.style.color='#004d7a'" onmouseout="this.style.color='var(--md-primary)'">Pehle thi account che? Login karo</a>
        <a href="{% url 'chatbot_forgot_password' %}" style="color: var(--md-on-surface-variant); text-decoration: none; transition: color var(--transition);" onmouseover="this.style.color='var(--md-primary)'" onmouseout="this.style.color='var(--md-on-surface-variant)'">Forgot Password?</a>
      </div>

      <form class="composer" id="chatForm" autocomplete="off">
        {% csrf_token %}
        <div class="input-container">
          <input id="chatInput" type="text" placeholder="Yahan type karo..." autofocus>
          <button id="sendBtn" class="send-btn" type="submit" aria-label="Send message">
            <svg viewBox="0 0 24 24">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
            </svg>
          </button>
        </div>
      </form>
    </section>
  </main>

  <script>
    // ── Steps ───────────────────────────────────────────────
    // name is pre-filled from LinkedIn if OAuth success
    const STEPS = [
      { key: "start", type: "text", placeholder: "Shuru karva mate message karo...", q: "👋 Kem cho! Registration chatbot ma tamaru swagat che. Shuru karva mate message type karo.", pct: 0 },
      { key: "name", type: "text", placeholder: "Puru naam", q: "Tamaru puru naam aapo.", pct: 20 },
      { key: "email", type: "email", placeholder: "name@example.com", q: "Email ID aapo.", pct: 40 },
      { key: "phone", type: "tel", placeholder: "10 digit number", q: "Mobile number aapo.", pct: 60 },
      { key: "password", type: "password", placeholder: "Password", q: "Password aapo (kam se kam 8 characters).", pct: 80 },
      { key: "confirm_password", type: "password", placeholder: "Confirm password", q: "Confirm password aapo.", pct: 95 },
    ];

    let stepIdx = 0;
    let isSubmitting = false;
    const formData = {};

    const form = document.getElementById("chatForm");
    const input = document.getElementById("chatInput");
    const messages = document.getElementById("messages");
    const sendBtn = document.getElementById("sendBtn");
    const progLabel = document.getElementById("progressLabel");
    const progFill = document.getElementById("progressFill");

    function getCsrf() {
      for (const c of document.cookie.split(";")) {
        const [k, v] = c.trim().split("=");
        if (k === "csrftoken") return decodeURIComponent(v);
      }
      return document.querySelector("[name=csrfmiddlewaretoken]")?.value ?? "";
    }

    function esc(s) {
      return String(s)
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;").replaceAll('"', "&quot;");
    }

    function msg(text, who, extra = "") {
      const row = document.createElement("div");
      row.className = `message-row ${who}${extra ? " " + extra : ""}`;
      const bub = document.createElement("div");
      bub.className = "bubble";
      bub.innerHTML = esc(text);
      row.appendChild(bub);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
      return row;
    }

    function msgHTML(html, who, extra = "") {
      const row = document.createElement("div");
      row.className = `message-row ${who}${extra ? " " + extra : ""}`;
      const bub = document.createElement("div");
      bub.className = "bubble";
      bub.innerHTML = html;
      row.appendChild(bub);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
      return row;
    }

    function setProgress(label, pct) {
      progLabel.textContent = label;
      progFill.style.width = pct + "%";
    }

    async function postJson(url, body) {
      const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-CSRFToken": getCsrf() },
        body: JSON.stringify(body),
      });
      const ct = r.headers.get("content-type") || "";
      if (ct.includes("application/json")) return r.json();
      return { success: false, message: "Server error." };
    }

    function validate(key, val) {
      if (!val.trim()) return "Aa field required che.";
      if (key === "email" && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) return "Valid email aapo.";
      if (key === "phone" && !/^\+?[0-9]{10,15}$/.test(val.replace(/\s/g, ""))) return "10-15 digit number aapo.";
      if (key === "confirm_password" && val !== formData.password) return "Password match nathi thatu.";
      return "";
    }

    // ── LinkedIn OAuth button ────────────────────────────────
    function addLinkedInButton() {
      const row = document.createElement("div");
      row.className = "message-row bot";
      const bub = document.createElement("div");
      bub.className = "bubble linkedin-card";
      bub.innerHTML = `
      <div style="margin-bottom:12px; font-weight: 500; font-size: 14px; color: var(--md-on-surface-variant);">Auto-fill your details from LinkedIn</div>
      <a href="{% url 'linkedin_oauth_start' %}" class="linkedin-btn" style="margin: 0 auto; display: inline-flex;">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
        LinkedIn thi Continue
      </a>
    `;
      row.appendChild(bub);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
    }

    // ── Check LinkedIn OAuth success ─────────────────────────
    async function checkLinkedInAuth() {
      const params = new URLSearchParams(window.location.search);
      if (params.get("linkedin_auth") === "success") {
        // Fetch user data from session
        try {
          const r = await fetch("{% url 'linkedin_userinfo_api' %}");
          const data = await r.json();
          if (data.success && data.profile) {
            const p = data.profile;
            msg("✅ LinkedIn thi data mali gayo!", "system", "ok");

            let info = "";
            if (p.name) info += `👤 Name: ${p.name}\n`;
            if (p.email) info += `📧 Email: ${p.email}\n`;
            if (p.picture) info += `🖼️ Photo: Available`;
            if (info) msg(info.trim(), "system", "ok");

            // Pre-fill form data from LinkedIn
            if (p.name) formData.name = p.name;
            if (p.email) formData.email = p.email;

            // Skip to appropriate step
            if (formData.name && formData.email) {
              stepIdx = 3; // skip start, name, email; start from phone
            } else if (formData.name) {
              stepIdx = 2; // skip start, name; start from email
            }

            // Clean URL
            window.history.replaceState({}, "", "/");
            loadStep(stepIdx);
            return;
          }
        } catch (e) { }
        // Fallback
        window.history.replaceState({}, "", "/");
      }

      if (params.get("linkedin_error")) {
        const err = params.get("linkedin_error");
        msg(`LinkedIn error: ${err}`, "system");
        window.history.replaceState({}, "", "/");
      }
    }

    // ── Load step ────────────────────────────────────────────
    function loadStep(idx) {
      const s = STEPS[idx];
      input.type = s.type;
      input.placeholder = s.placeholder;
      input.value = "";
      input.disabled = false;
      sendBtn.disabled = false;
      setProgress(`Step ${idx} of ${STEPS.length - 1}`, s.pct);

      if (idx === 1) {
        // Show LinkedIn option here on the second step (now the Name step)
        msg("Tamare direct login/register karvu hoy to tame LinkedIn thi login/register kari sako cho:", "bot");
        addLinkedInButton();
        msg("Athva manually continue karva tamaru puru naam aapo:", "bot");
      } else {
        msg(s.q, "bot");
      }

      // Show pre-filled value if available
      if (s.key === "name" && formData.name) {
        msg(`(LinkedIn thi: ${formData.name} — change karvu hoy to type karo, nahi to Enter dabao)`, "bot");
        input.value = formData.name;
      }
      if (s.key === "email" && formData.email) {
        msg(`(LinkedIn thi: ${formData.email} — change karvu hoy to type karo, nahi to Enter dabao)`, "bot");
        input.value = formData.email;
      }

      input.focus();
    }

    // ── Submit registration ──────────────────────────────────
    async function submitReg() {
      isSubmitting = true;
      sendBtn.disabled = true;
      input.disabled = true;
      setProgress("Saving...", 95);
      msg("⏳ Account banavi rahyo chu...", "bot");

      try {
        const res = await postJson("{% url 'register_chatbot_user' %}", formData);
        if (res.success) {
          setProgress("Done ✓", 100);
          msg("🎉 Registration successful!\nHome page par redirect thai rahyo chu...", "system", "ok");
          setTimeout(() => { window.location.href = res.redirect_url || "/home/"; }, 1500);
        } else {
          msg(res.message || "Error aavyo.", "system");
          isSubmitting = false;
          const errKey = res.errors ? Object.keys(res.errors)[0] : null;
          const backIdx = errKey ? STEPS.findIndex(s => s.key === errKey) : 1;
          stepIdx = backIdx >= 1 ? backIdx : 1;
          loadStep(stepIdx);
        }
      } catch {
        msg("Server error. Server chaltu che ke check karo.", "system");
        isSubmitting = false;
        sendBtn.disabled = false;
        input.disabled = false;
      }
    }

    // ── Form submit ──────────────────────────────────────────
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (isSubmitting) return;

      const raw = input.value;
      const val = raw.trim() || (input.value.trim()); // allow pre-filled
      if (!val) { input.focus(); return; }

      // Admin shortcut — "admin" type kare to admin panel par redirect
      if (val.toLowerCase() === "admin") {
        msg("admin", "user");
        msg("🔐 Admin panel par redirect thai rahyo chu...", "bot");
        setTimeout(() => { window.location.href = "/user-details/"; }, 800);
        return;
      }

      if (stepIdx === 0) {
        msg(val, "user");
        stepIdx++;
        loadStep(stepIdx);
        return;
      }

      const step = STEPS[stepIdx];
      const norm = step.key === "phone" ? val.replace(/\s/g, "") : val;
      const err = validate(step.key, norm);

      if (err) { msg(err, "system"); input.focus(); return; }

      formData[step.key] = norm;
      msg(step.type === "password" ? "••••••••" : norm, "user");

      stepIdx++;
      if (stepIdx < STEPS.length) {
        loadStep(stepIdx);
      } else {
        await submitReg();
      }
    });

    // ── Start ────────────────────────────────────────────────
    async function init() {
      await checkLinkedInAuth();  // check if returning from LinkedIn OAuth
      if (stepIdx === 0) {
        // Simple greet and prompt to type a start message
        msg("👋 Kem cho! Registration chatbot ma tamaru swagat che.", "bot");
        setProgress("Start", 0);
        input.type = "text";
        input.placeholder = "Shuru karva mate message karo...";
        input.disabled = false;
        sendBtn.disabled = false;

        setTimeout(() => {
          msg("How can I Help You:", "bot");
          input.focus();
        }, 600);
      }
    }

    init();
  </script>
</body>

</html>
