<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registration Chatbot</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --ink: #172026;
      --muted: #667076;
      --line: #d7d1c6;
      --panel: #ffffff;
      --bot: #e8f2ef;
      --user: #1f5f6a;
      --user-ink: #ffffff;
      --accent: #cf5c36;
      --accent-dark: #a64222;
      --ok: #237a57;
      --danger: #b3261e;
      --shadow: 0 18px 45px rgba(23, 32, 38, .14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(31, 95, 106, .12), transparent 34%),
        linear-gradient(315deg, rgba(207, 92, 54, .16), transparent 32%),
        var(--bg);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .chat-shell {
      width: min(920px, 100%);
      min-height: min(760px, calc(100vh - 48px));
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: #fffaf2;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #1f5f6a;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      flex-shrink: 0;
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 178px;
      color: var(--muted);
      font-size: 13px;
    }

    .progress-track {
      flex: 1;
      height: 8px;
      border-radius: 999px;
      background: #ded8ce;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: var(--accent);
      transition: width 300ms ease;
    }

    .messages {
      min-height: 0;
      padding: 22px;
      overflow-y: auto;
      background:
        linear-gradient(rgba(255, 255, 255, .82), rgba(255, 255, 255, .82)),
        repeating-linear-gradient(0deg, #f0ede6 0, #f0ede6 1px, transparent 1px, transparent 34px);
    }

    .message-row {
      display: flex;
      margin-bottom: 14px;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: min(640px, 86%);
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.55;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      box-shadow: 0 1px 0 rgba(23, 32, 38, .05);
    }

    .bot .bubble {
      background: var(--bot);
      border: 1px solid #cadfd8;
      color: var(--ink);
    }

    .user .bubble {
      background: var(--user);
      border: 1px solid #174b54;
      color: var(--user-ink);
    }

    .system .bubble {
      background: #fff3f1;
      border: 1px solid #f0c4be;
      color: var(--danger);
    }

    .system.ok .bubble {
      background: #edf8f2;
      border-color: #badfcc;
      color: var(--ok);
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr 48px;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid var(--line);
      background: #fffaf2;
    }

    input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border: 1px solid #b9afa2;
      border-radius: 8px;
      font-size: 16px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    input:focus {
      border-color: var(--user);
      box-shadow: 0 0 0 3px rgba(31, 95, 106, .16);
    }

    button {
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button:disabled {
      opacity: .65;
      cursor: wait;
    }

    /* LinkedIn button */
    .linkedin-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      margin: 8px 0;
      background: #0077b5;
      color: #fff;
      border: 0;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      width: fit-content;
    }

    .linkedin-btn:hover {
      background: #005f91;
    }

    .linkedin-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
      flex-shrink: 0;
    }

    @media (max-width:640px) {
      main {
        padding: 0;
      }

      .chat-shell {
        min-height: 100vh;
        border: 0;
        border-radius: 0;
      }

      .chat-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .progress {
        width: 100%;
      }

      .messages {
        padding: 16px;
      }

      .bubble {
        max-width: 92%;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="chat-shell" aria-label="Registration chatbot">
      <header class="chat-header">
        <div class="brand">
          <div class="mark">CB</div>
          <div>
            <h1>Registration Chatbot</h1>
            <div class="subtitle">Navu account banavo</div>
          </div>
        </div>
        <div class="progress" aria-live="polite">
          <span id="progressLabel">Start</span>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </header>

      <div class="messages" id="messages" aria-live="polite"></div>

      <form class="composer" id="chatForm" autocomplete="off">
        {% csrf_token %}
        <input id="chatInput" type="text" placeholder="Yahan type karo..." autofocus>
        <button id="sendBtn" type="submit">&gt;</button>
      </form>
    </section>
  </main>

  <script>
    // ── Steps ───────────────────────────────────────────────
    // name is pre-filled from LinkedIn if OAuth success
    const STEPS = [
      { key: "name", type: "text", placeholder: "Puru naam", q: "Tamaru puru naam aapo (ya upar LinkedIn button use karo).", pct: 0 },
      { key: "email", type: "email", placeholder: "name@example.com", q: "Email ID aapo.", pct: 25 },
      { key: "phone", type: "tel", placeholder: "10 digit number", q: "Mobile number aapo.", pct: 50 },
      { key: "password", type: "password", placeholder: "Password", q: "Password aapo (kam se kam 8 characters).", pct: 75 },
      { key: "confirm_password", type: "password", placeholder: "Confirm password", q: "Confirm password aapo.", pct: 90 },
    ];

    let stepIdx = 0;
    let isSubmitting = false;
    const formData = {};

    const form = document.getElementById("chatForm");
    const input = document.getElementById("chatInput");
    const messages = document.getElementById("messages");
    const sendBtn = document.getElementById("sendBtn");
    const progLabel = document.getElementById("progressLabel");
    const progFill = document.getElementById("progressFill");

    function getCsrf() {
      for (const c of document.cookie.split(";")) {
        const [k, v] = c.trim().split("=");
        if (k === "csrftoken") return decodeURIComponent(v);
      }
      return document.querySelector("[name=csrfmiddlewaretoken]")?.value ?? "";
    }

    function esc(s) {
      return String(s)
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;").replaceAll('"', "&quot;");
    }

    function msg(text, who, extra = "") {
      const row = document.createElement("div");
      row.className = `message-row ${who}${extra ? " " + extra : ""}`;
      const bub = document.createElement("div");
      bub.className = "bubble";
      bub.innerHTML = esc(text);
      row.appendChild(bub);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
      return row;
    }

    function msgHTML(html, who, extra = "") {
      const row = document.createElement("div");
      row.className = `message-row ${who}${extra ? " " + extra : ""}`;
      const bub = document.createElement("div");
      bub.className = "bubble";
      bub.innerHTML = html;
      row.appendChild(bub);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
      return row;
    }

    function setProgress(label, pct) {
      progLabel.textContent = label;
      progFill.style.width = pct + "%";
    }

    async function postJson(url, body) {
      const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-CSRFToken": getCsrf() },
        body: JSON.stringify(body),
      });
      const ct = r.headers.get("content-type") || "";
      if (ct.includes("application/json")) return r.json();
      return { success: false, message: "Server error." };
    }

    function validate(key, val) {
      if (!val.trim()) return "Aa field required che.";
      if (key === "email" && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) return "Valid email aapo.";
      if (key === "phone" && !/^\+?[0-9]{10,15}$/.test(val.replace(/\s/g, ""))) return "10-15 digit number aapo.";
      if (key === "confirm_password" && val !== formData.password) return "Password match nathi thatu.";
      return "";
    }

    // ── LinkedIn OAuth button ────────────────────────────────
    function addLinkedInButton() {
      const row = document.createElement("div");
      row.className = "message-row bot";
      const bub = document.createElement("div");
      bub.className = "bubble";
      bub.innerHTML = `
      <div style="margin-bottom:8px;">Ya LinkedIn thi data auto-fill karo:</div>
      <a href="{% url 'linkedin_oauth_start' %}" class="linkedin-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
        LinkedIn thi Continue
      </a>
    `;
      row.appendChild(bub);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
    }

    // ── Check LinkedIn OAuth success ─────────────────────────
    async function checkLinkedInAuth() {
      const params = new URLSearchParams(window.location.search);
      if (params.get("linkedin_auth") === "success") {
        // Fetch user data from session
        try {
          const r = await fetch("{% url 'linkedin_userinfo_api' %}");
          const data = await r.json();
          if (data.success && data.profile) {
            const p = data.profile;
            msg("✅ LinkedIn thi data mali gayo!", "system", "ok");

            let info = "";
            if (p.name) info += `👤 Name: ${p.name}\n`;
            if (p.email) info += `📧 Email: ${p.email}\n`;
            if (p.picture) info += `🖼️ Photo: Available`;
            if (info) msg(info.trim(), "system", "ok");

            // Pre-fill form data from LinkedIn
            if (p.name) formData.name = p.name;
            if (p.email) formData.email = p.email;

            // Skip to appropriate step
            if (formData.name && formData.email) {
              stepIdx = 2; // skip name+email, start from phone
            } else if (formData.name) {
              stepIdx = 1; // skip name, start from email
            }

            // Clean URL
            window.history.replaceState({}, "", "/");
            loadStep(stepIdx);
            return;
          }
        } catch (e) { }
        // Fallback
        window.history.replaceState({}, "", "/");
      }

      if (params.get("linkedin_error")) {
        const err = params.get("linkedin_error");
        msg(`LinkedIn error: ${err}`, "system");
        window.history.replaceState({}, "", "/");
      }
    }

    // ── Load step ────────────────────────────────────────────
    function loadStep(idx) {
      const s = STEPS[idx];
      input.type = s.type;
      input.placeholder = s.placeholder;
      input.value = "";
      input.disabled = false;
      sendBtn.disabled = false;
      setProgress(`Step ${idx + 1} of ${STEPS.length}`, s.pct);
      msg(s.q, "bot");

      // Show pre-filled value if available
      if (s.key === "name" && formData.name) {
        msg(`(LinkedIn thi: ${formData.name} — change karvu hoy to type karo, nahi to Enter dabao)`, "bot");
        input.value = formData.name;
      }
      if (s.key === "email" && formData.email) {
        msg(`(LinkedIn thi: ${formData.email} — change karvu hoy to type karo, nahi to Enter dabao)`, "bot");
        input.value = formData.email;
      }

      input.focus();
    }

    // ── Submit registration ──────────────────────────────────
    async function submitReg() {
      isSubmitting = true;
      sendBtn.disabled = true;
      input.disabled = true;
      setProgress("Saving...", 95);
      msg("⏳ Account banavi rahyo chu...", "bot");

      try {
        const res = await postJson("{% url 'register_chatbot_user' %}", formData);
        if (res.success) {
          setProgress("Done ✓", 100);
          msg("🎉 Registration successful!\nHome page par redirect thai rahyo chu...", "system", "ok");
          setTimeout(() => { window.location.href = res.redirect_url || "/home/"; }, 1500);
        } else {
          msg(res.message || "Error aavyo.", "system");
          isSubmitting = false;
          const errKey = res.errors ? Object.keys(res.errors)[0] : null;
          const backIdx = errKey ? STEPS.findIndex(s => s.key === errKey) : 0;
          stepIdx = backIdx >= 0 ? backIdx : 0;
          loadStep(stepIdx);
        }
      } catch {
        msg("Server error. Server chaltu che ke check karo.", "system");
        isSubmitting = false;
        sendBtn.disabled = false;
        input.disabled = false;
      }
    }

    // ── Form submit ──────────────────────────────────────────
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (isSubmitting) return;

      const raw = input.value;
      const val = raw.trim() || (input.value.trim()); // allow pre-filled
      if (!val) { input.focus(); return; }

      const step = STEPS[stepIdx];
      const norm = step.key === "phone" ? val.replace(/\s/g, "") : val;
      const err = validate(step.key, norm);

      if (err) { msg(err, "system"); input.focus(); return; }

      formData[step.key] = norm;
      msg(step.type === "password" ? "••••••••" : norm, "user");

      stepIdx++;
      if (stepIdx < STEPS.length) {
        loadStep(stepIdx);
      } else {
        await submitReg();
      }
    });

    // ── Start ────────────────────────────────────────────────
    async function init() {
      await checkLinkedInAuth();  // check if returning from LinkedIn OAuth
      if (stepIdx === 0) {
        // Normal start - show welcome + LinkedIn button + first step
        msg("👋 Kem cho! Chalo account banaoye.\n\nTamaru puru naam aapo — ya LinkedIn thi data auto-fill karo:", "bot");
        addLinkedInButton();
        setProgress("Step 1 of 5", 0);
        input.type = "text";
        input.placeholder = "Puru naam";
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    init();
  </script>
</body>

</html>
