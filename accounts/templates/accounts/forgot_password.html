<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password - LinkedIn Assistant</title>
  <!-- Google Fonts — Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── MD3 Color Tokens (Light Scheme) ───────────────────── */
    :root {
      --md-primary: #00639b;
      --md-on-primary: #ffffff;
      --md-primary-container: #d1e4ff;
      --md-on-primary-cont: #001d35;

      --md-surface: #f8f9ff;
      --md-surface-1: #ffffff;
      --md-surface-2: #f1f3f9;
      --md-surface-variant: #e1e2ec;
      --md-on-surface: #1a1c1e;
      --md-on-surface-variant: #44474f;
      --md-outline: #74777f;
      --md-outline-variant: #c4c6d0;

      --md-error: #ba1a1a;
      --md-error-container: #ffdad6;
      --md-on-error-cont: #410002;

      --md-success: #006e33;
      --md-success-container: #96f7ad;
      --md-on-success-cont: #00210b;

      --md-elev-1: 0 1px 3px 1px rgba(0, 0, 0, .15), 0 1px 2px 0 rgba(0, 0, 0, .3);
      --md-elev-2: 0 2px 6px 2px rgba(0, 0, 0, .15), 0 1px 2px 0 rgba(0, 0, 0, .3);
      --md-elev-3: 0 4px 8px 3px rgba(0, 0, 0, .15), 0 1px 3px 0 rgba(0, 0, 0, .3);

      --md-radius-md: 12px;
      --md-radius-lg: 16px;
      --md-radius-xl: 24px;
      --md-radius-full: 999px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Outfit', sans-serif;
      color: var(--md-on-surface);
      background: var(--md-surface);
      background-image: radial-gradient(circle at 10% 20%, rgba(0, 99, 155, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(83, 95, 112, 0.05) 0%, transparent 40%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .forgot-card {
      width: min(440px, 100%);
      background: var(--md-surface-1);
      border-radius: var(--md-radius-xl);
      box-shadow: var(--md-elev-3);
      padding: 40px;
      text-align: center;
      border: 1px solid var(--md-outline-variant);
    }

    .brand-mark {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: var(--md-radius-lg);
      background: var(--md-primary);
      color: var(--md-on-primary);
      font-weight: 700;
      font-size: 20px;
      margin: 0 auto 16px;
      box-shadow: var(--md-elev-1);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: var(--md-on-surface);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--md-on-surface-variant);
      margin-bottom: 32px;
      line-height: 1.4;
    }

    .status-container {
      border-radius: var(--md-radius-md);
      padding: 12px 16px;
      font-size: 14px;
      text-align: left;
      margin-bottom: 24px;
      display: none;
      border: 1px solid transparent;
    }

    .status-container.error {
      background: var(--md-error-container);
      color: var(--md-on-error-cont);
      display: block;
    }

    .status-container.success {
      background: var(--md-success-container);
      color: var(--md-on-success-cont);
      display: block;
    }

    .field-container {
      position: relative;
      margin-bottom: 24px;
      width: 100%;
    }

    .field-container input {
      width: 100%;
      height: 56px;
      padding: 8px 16px;
      font-size: 16px;
      border: 1px solid var(--md-outline);
      border-radius: 8px;
      outline: none;
      background: transparent;
      transition: border-color 0.2s, border-width 0.1s;
      font-family: 'Outfit', sans-serif;
      color: var(--md-on-surface);
    }

    .field-container input:focus {
      border-color: var(--md-primary);
      border-width: 2px;
      padding: 7px 15px;
    }

    .field-container label {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--md-surface-1);
      padding: 0 4px;
      color: var(--md-on-surface-variant);
      transition: 0.2s ease all;
      pointer-events: none;
      font-size: 16px;
    }

    .field-container input:focus ~ label,
    .field-container input:not(:placeholder-shown) ~ label {
      top: 0;
      font-size: 12px;
      color: var(--md-primary);
      font-weight: 500;
    }

    .btn-submit {
      width: 100%;
      height: 48px;
      background: var(--md-primary);
      color: var(--md-on-primary);
      border: none;
      border-radius: var(--md-radius-full);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--md-elev-1);
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      font-family: 'Outfit', sans-serif;
      margin-top: 12px;
    }

    .btn-submit:hover {
      background: #004d7a;
      box-shadow: var(--md-elev-2);
    }

    .btn-submit:active {
      transform: scale(0.98);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .links-footer {
      margin-top: 28px;
      font-size: 14px;
    }

    .links-footer a {
      color: var(--md-primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .links-footer a:hover {
      color: #004d7a;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="forgot-card">
    <div class="brand-mark">CB</div>
    <h1>Reset Password</h1>
    <div class="subtitle">Tamaro email aapo, password reset karvani link email par moklva ma aavshe</div>

    <div class="status-container" id="statusBox"></div>

    <form id="forgotForm">
      {% csrf_token %}
      <div class="field-container">
        <input type="email" name="email" id="id_email" placeholder=" " required autofocus>
        <label for="id_email">Email ID</label>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        Send Reset Link
      </button>
    </form>

    <div class="links-footer">
      <a href="{% url 'chatbot_login' %}">← Back to Login</a>
    </div>
  </div>

  <script>
    const form = document.getElementById("forgotForm");
    const statusBox = document.getElementById("statusBox");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusBox.className = "status-container";
      statusBox.style.display = "none";
      statusBox.innerHTML = "";
      submitBtn.disabled = true;
      submitBtn.innerText = "Sending...";

      const email = document.getElementById("id_email").value.trim();
      const csrf = document.querySelector("[name=csrfmiddlewaretoken]")?.value ?? "";

      try {
        const r = await fetch("{% url 'forgot_password_user' %}", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrf
          },
          body: JSON.stringify({ email })
        });
        const data = await r.json();
        
        submitBtn.disabled = false;
        submitBtn.innerText = "Send Reset Link";
        
        if (data.success) {
          statusBox.classList.add("success");
          statusBox.innerText = data.message || "Password reset link tamara email par mokli didhi che.";
          document.getElementById("id_email").value = "";
        } else {
          statusBox.classList.add("error");
          statusBox.innerText = data.message || "Email address database ma nathi.";
        }
      } catch (e) {
        submitBtn.disabled = false;
        submitBtn.innerText = "Send Reset Link";
        statusBox.classList.add("error");
        statusBox.innerText = "Server error. Try again.";
      }
    });
  </script>
</body>

</html>
