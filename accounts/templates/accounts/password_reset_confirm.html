<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --ink: #172026;
      --muted: #667076;
      --line: #d7d1c6;
      --panel: #ffffff;
      --accent: #cf5c36;
      --accent-dark: #a64222;
      --danger: #b3261e;
      --shadow: 0 18px 45px rgba(23, 32, 38, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    .panel {
      width: min(440px, 100%);
      padding: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
    }

    input {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      border: 1px solid #b9afa2;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      width: 100%;
      height: 46px;
      margin-top: 18px;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      background: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    .errors {
      margin-top: 10px;
      color: var(--danger);
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="panel">
    {% if validlink %}
      <h1>Reset Password</h1>
      <p>New password set karo.</p>
      <form method="post">
        {% csrf_token %}

        <label for="{{ form.new_password1.id_for_label }}">New password</label>
        {{ form.new_password1 }}

        <label for="{{ form.new_password2.id_for_label }}">Confirm password</label>
        {{ form.new_password2 }}

        {% if form.errors %}
          <div class="errors">{{ form.errors }}</div>
        {% endif %}

        <button type="submit">Save Password</button>
      </form>
    {% else %}
      <h1>Link Invalid</h1>
      <p>Aa password reset link invalid athva expire thai gai che.</p>
    {% endif %}
  </main>
</body>
</html>
